server:
  port: 8082

spring:
  application:
    name: CUSTOMER-SERVICE

  datasource:
    url: ${CUSTOMER_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
      hibernate:
        ddl-auto: update

      show-sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka
